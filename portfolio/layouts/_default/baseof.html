<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <script>
    // Expose baseURL for JS so fetches work when the site is hosted under a subpath (e.g., GitHub Pages)
    window.__BASEURL__ = "{{ .Site.BaseURL }}";
  </script>
  <script src="{{ "js/terminal.js" | relURL }}"></script>
</head>
<body>
<div class="terminal">
  <div id="terminal-output"></div>
  {{ block "main" . }}{{ end }}
  <div class="input-line">
    <div class="prompt-top"><span class="box">┌──(</span><span class="user">lvl999mafiaboss㉿portfolio</span><span class="box">)-[</span><span class="path" id="current-path">~</span><span class="box">]</span></div>
    <div class="prompt-bottom"><span class="box">└─</span><span class="symbol">$</span><span class="input-wrapper"><input type="text" id="command-input" autofocus spellcheck="false" autocomplete="off" /><span id="autocomplete-suggestion"></span></span></div>
  </div>
</div>
</body>
</html>
